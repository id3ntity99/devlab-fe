<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark mode version -->
  <defs>
    <linearGradient id="gradientPrimaryDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradientAccentDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6EE7B7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Code brackets icon -->
  <g transform="translate(10, 10)">
    <!-- Left bracket -->
    <path d="M 15 5 L 8 5 C 5 5 3 7 3 10 L 3 30 C 3 33 5 35 8 35 L 15 35" 
          stroke="url(#gradientPrimaryDark)" 
          stroke-width="3.5" 
          stroke-linecap="round" 
          fill="none"/>
    
    <!-- Right bracket -->
    <path d="M 25 5 L 32 5 C 35 5 37 7 37 10 L 37 30 C 37 33 35 35 32 35 L 25 35" 
          stroke="url(#gradientAccentDark)" 
          stroke-width="3.5" 
          stroke-linecap="round" 
          fill="none"/>
    
    <!-- Center forward slash -->
    <line x1="23" y1="10" x2="17" y2="30" 
          stroke="url(#gradientPrimaryDark)" 
          stroke-width="3.5" 
          stroke-linecap="round"/>
  </g>
  
  <!-- DevLab text -->
  <text x="60" y="38" 
        font-family="'Montserrat', sans-serif" 
        font-size="28" 
        font-weight="800" 
        letter-spacing="-0.5">
    <tspan fill="url(#gradientPrimaryDark)">Dev</tspan><tspan fill="#F1F5F9">Lab</tspan>
  </text>
</svg>
