<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevLab - 회원가입</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Montserrat:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --secondary: #10b981;
        --bg-primary: #ffffff;
        --bg-secondary: #f9fafb;
        --bg-tertiary: #f3f4f6;
        --text-primary: #1f2937;
        --text-secondary: #6b7280;
        --text-muted: #9ca3af;
        --border: #e5e7eb;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Noto Sans KR", sans-serif;
        background: var(--bg-secondary);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      /* Animated background */
      .bg-decoration {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
      }

      .circle {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.15;
        animation: float 20s infinite ease-in-out;
      }

      .circle-1 {
        width: 400px;
        height: 400px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        top: -200px;
        left: -200px;
        animation-delay: 0s;
      }

      .circle-2 {
        width: 300px;
        height: 300px;
        background: linear-gradient(135deg, #10b981, #34d399);
        bottom: -150px;
        right: -150px;
        animation-delay: 3s;
      }

      .circle-3 {
        width: 250px;
        height: 250px;
        background: linear-gradient(135deg, #8b5cf6, #a78bfa);
        top: 50%;
        right: 10%;
        animation-delay: 6s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(30px, -30px) scale(1.1);
        }
        66% {
          transform: translate(-20px, 20px) scale(0.9);
        }
      }

      /* Container */
      .signup-container {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        max-width: 1100px;
        width: 90%;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        overflow: hidden;
        border: 1px solid var(--border);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
      }

      /* Left side - Branding */
      .brand-side {
        padding: 60px;
        background: linear-gradient(
          135deg,
          rgba(99, 102, 241, 0.05),
          rgba(139, 92, 246, 0.05)
        );
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      .brand-side::before {
        content: "";
        position: absolute;
        width: 300px;
        height: 300px;
        background: radial-gradient(
          circle,
          rgba(99, 102, 241, 0.15),
          transparent
        );
        border-radius: 50%;
        top: -100px;
        right: -100px;
      }

      .logo {
        font-family: "Montserrat", sans-serif;
        font-size: 36px;
        font-weight: 800;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 24px;
      }

      .brand-title {
        font-size: 32px;
        font-weight: 900;
        margin-bottom: 16px;
        line-height: 1.3;
        color: var(--text-primary);
      }

      .brand-description {
        font-size: 16px;
        color: var(--text-secondary);
        line-height: 1.7;
        margin-bottom: 32px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 32px;
      }

      .stat-box {
        background: rgba(99, 102, 241, 0.05);
        border: 1px solid rgba(99, 102, 241, 0.15);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
      }

      .stat-number {
        font-size: 28px;
        font-weight: 900;
        color: var(--primary);
        font-family: "Montserrat", sans-serif;
        margin-bottom: 4px;
      }

      .stat-label {
        font-size: 13px;
        color: var(--text-secondary);
      }

      /* Right side - Form */
      .form-side {
        padding: 60px;
        background: var(--bg-primary);
        overflow-y: auto;
        max-height: 90vh;
      }

      .form-header {
        margin-bottom: 32px;
      }

      .form-title {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
        color: var(--text-primary);
      }

      .form-subtitle {
        font-size: 14px;
        color: var(--text-muted);
      }

      .form-subtitle a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }

      .form-subtitle a:hover {
        text-decoration: underline;
      }

      /* Social signup */
      .social-signup {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 24px;
      }

      .social-btn {
        padding: 12px;
        background: var(--bg-primary);
        border: 2px solid var(--border);
        border-radius: 8px;
        color: var(--text-primary);
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .social-btn:hover {
        background: var(--bg-secondary);
        border-color: var(--primary);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 24px 0;
        color: var(--text-muted);
        font-size: 14px;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* Form inputs */
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 20px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
      }

      .form-label .required {
        color: #ef4444;
      }

      .form-input {
        width: 100%;
        padding: 12px 16px;
        background: var(--bg-primary);
        border: 2px solid var(--border);
        border-radius: 8px;
        color: var(--text-primary);
        font-size: 15px;
        transition: all 0.2s;
      }

      .form-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
      }

      .form-input::placeholder {
        color: var(--text-muted);
      }

      .form-select {
        width: 100%;
        padding: 12px 16px;
        background: var(--bg-primary);
        border: 2px solid var(--border);
        border-radius: 8px;
        color: var(--text-primary);
        font-size: 15px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .form-select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
      }

      .password-requirements {
        margin-top: 8px;
        padding: 12px;
        background: rgba(99, 102, 241, 0.05);
        border: 1px solid rgba(99, 102, 241, 0.15);
        border-radius: 6px;
        font-size: 12px;
      }

      .requirement {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
        color: var(--text-muted);
      }

      .requirement.met {
        color: var(--secondary);
      }

      .requirement-icon {
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Checkboxes */
      .checkbox-group {
        margin-bottom: 24px;
      }

      .checkbox-label {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 12px;
        font-size: 14px;
        color: var(--text-secondary);
        cursor: pointer;
      }

      .checkbox-label input {
        margin-top: 2px;
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .checkbox-label a {
        color: var(--primary);
        text-decoration: none;
      }

      .checkbox-label a:hover {
        text-decoration: underline;
      }

      .btn-primary {
        width: 100%;
        padding: 14px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 16px;
      }

      .btn-primary:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
      }

      .btn-primary:disabled {
        background: var(--bg-tertiary);
        color: var(--text-muted);
        cursor: not-allowed;
        transform: none;
      }

      .form-footer {
        text-align: center;
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.6;
      }

      /* Steps indicator */
      .steps-indicator {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 32px;
      }

      .step-dot {
        width: 40px;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        transition: all 0.3s;
      }

      .step-dot.active {
        background: var(--primary);
      }

      .step-dot.completed {
        background: var(--secondary);
      }

      /* Responsive */
      @media (max-width: 968px) {
        .signup-container {
          grid-template-columns: 1fr;
        }

        .brand-side {
          display: none;
        }

        .form-row {
          grid-template-columns: 1fr;
        }
      }

      /* Scrollbar */
      .form-side::-webkit-scrollbar {
        width: 8px;
      }

      .form-side::-webkit-scrollbar-track {
        background: var(--bg-secondary);
      }

      .form-side::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      .form-side::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <div class="bg-decoration">
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>
      <div class="circle circle-3"></div>
    </div>

    <div class="signup-container">
      <!-- Brand Side -->
      <div class="brand-side">
        <div class="logo">DevLab</div>
        <h2 class="brand-title">프로젝트 하나로<br />개발자 경력 시작하기</h2>
        <p class="brand-description">
          이미 수많은 개발자들이 DevLab에서<br />
          실전 프로젝트를 완성하고 꿈을 이뤘습니다.
        </p>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-number">50K+</div>
            <div class="stat-label">활성 사용자</div>
          </div>
          <div class="stat-box">
            <div class="stat-number">2,500+</div>
            <div class="stat-label">프로젝트 킷</div>
          </div>
          <div class="stat-box">
            <div class="stat-number">95%</div>
            <div class="stat-label">수료율</div>
          </div>
          <div class="stat-box">
            <div class="stat-number">1,200+</div>
            <div class="stat-label">전문 강사</div>
          </div>
        </div>
      </div>

      <!-- Form Side -->
      <div class="form-side">
        <div class="form-header">
          <h1 class="form-title">회원가입</h1>
          <p class="form-subtitle">
            이미 계정이 있으신가요? <a href="#login">로그인</a>
          </p>
        </div>

        <!-- Steps Indicator -->
        <div class="steps-indicator">
          <div class="step-dot active"></div>
          <div class="step-dot"></div>
          <div class="step-dot"></div>
        </div>

        <!-- Social Signup -->
        <div class="social-signup">
          <button class="social-btn"><span>G</span> Google로 시작</button>
          <button class="social-btn"><span>GH</span> GitHub로 시작</button>
        </div>

        <div class="divider">또는 이메일로 가입</div>

        <form>
          <!-- Name Fields -->
          <div class="form-row">
            <div class="form-group">
              <label class="form-label"
                >이름 <span class="required">*</span></label
              >
              <input
                type="text"
                class="form-input"
                placeholder="홍길동"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label"
                >닉네임 <span class="required">*</span></label
              >
              <input
                type="text"
                class="form-input"
                placeholder="devmaster"
                required
              />
            </div>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label class="form-label"
              >이메일 <span class="required">*</span></label
            >
            <input
              type="email"
              class="form-input"
              placeholder="your@email.com"
              required
            />
          </div>

          <!-- Password -->
          <div class="form-group">
            <label class="form-label"
              >비밀번호 <span class="required">*</span></label
            >
            <input
              type="password"
              class="form-input"
              placeholder="8자 이상 입력해주세요"
              required
            />
            <div class="password-requirements">
              <div class="requirement">
                <span class="requirement-icon">○</span>
                <span>8자 이상</span>
              </div>
              <div class="requirement">
                <span class="requirement-icon">○</span>
                <span>영문 포함</span>
              </div>
              <div class="requirement">
                <span class="requirement-icon">○</span>
                <span>숫자 포함</span>
              </div>
              <div class="requirement">
                <span class="requirement-icon">○</span>
                <span>특수문자 포함</span>
              </div>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <label class="form-label"
              >비밀번호 확인 <span class="required">*</span></label
            >
            <input
              type="password"
              class="form-input"
              placeholder="비밀번호를 다시 입력해주세요"
              required
            />
          </div>

          <!-- Role Selection -->
          <div class="form-group">
            <label class="form-label"
              >가입 목적 <span class="required">*</span></label
            >
            <select class="form-select" required>
              <option value="">선택해주세요</option>
              <option value="learner">프로젝트 학습하기</option>
              <option value="creator">프로젝트 킷 판매하기</option>
              <option value="both">둘 다</option>
            </select>
          </div>

          <!-- Interests -->
          <div class="form-group">
            <label class="form-label">관심 분야</label>
            <select class="form-select">
              <option value="">선택해주세요 (선택사항)</option>
              <option value="web">웹 개발</option>
              <option value="mobile">모바일 앱</option>
              <option value="data">데이터 사이언스</option>
              <option value="ml">머신러닝/AI</option>
              <option value="game">게임 개발</option>
              <option value="backend">백엔드</option>
              <option value="devops">DevOps</option>
            </select>
          </div>

          <!-- Terms and Conditions -->
          <div class="checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" required />
              <span
                ><a href="#terms">이용약관</a> 및
                <a href="#privacy">개인정보처리방침</a>에 동의합니다
                <span class="required">*</span></span
              >
            </label>
            <label class="checkbox-label">
              <input type="checkbox" />
              <span>마케팅 정보 수신에 동의합니다 (선택)</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" />
              <span>이벤트 및 프로모션 알림을 받겠습니다 (선택)</span>
            </label>
          </div>

          <button type="submit" class="btn-primary">회원가입</button>

          <div class="form-footer">
            가입하시면 DevLab의
            <a href="#terms" style="color: var(--primary)">서비스 약관</a
            >과<br />
            <a href="#privacy" style="color: var(--primary)"
              >개인정보 보호정책</a
            >에 동의하게 됩니다.
          </div>
        </form>
      </div>
    </div>

    <script>
      // Password strength checker
      const passwordInput = document.querySelector('input[type="password"]');
      const requirements = document.querySelectorAll(".requirement");

      if (passwordInput) {
        passwordInput.addEventListener("input", function () {
          const value = this.value;

          // Check length
          if (value.length >= 8) {
            requirements[0].classList.add("met");
            requirements[0].querySelector(".requirement-icon").textContent =
              "✓";
          } else {
            requirements[0].classList.remove("met");
            requirements[0].querySelector(".requirement-icon").textContent =
              "○";
          }

          // Check letters
          if (/[a-zA-Z]/.test(value)) {
            requirements[1].classList.add("met");
            requirements[1].querySelector(".requirement-icon").textContent =
              "✓";
          } else {
            requirements[1].classList.remove("met");
            requirements[1].querySelector(".requirement-icon").textContent =
              "○";
          }

          // Check numbers
          if (/[0-9]/.test(value)) {
            requirements[2].classList.add("met");
            requirements[2].querySelector(".requirement-icon").textContent =
              "✓";
          } else {
            requirements[2].classList.remove("met");
            requirements[2].querySelector(".requirement-icon").textContent =
              "○";
          }

          // Check special characters
          if (/[^a-zA-Z0-9]/.test(value)) {
            requirements[3].classList.add("met");
            requirements[3].querySelector(".requirement-icon").textContent =
              "✓";
          } else {
            requirements[3].classList.remove("met");
            requirements[3].querySelector(".requirement-icon").textContent =
              "○";
          }
        });
      }

      // Form validation
      const form = document.querySelector("form");
      const termsCheckbox = document.querySelector(
        'input[type="checkbox"][required]',
      );
      const submitButton = document.querySelector(".btn-primary");

      if (form) {
        form.addEventListener("submit", function (e) {
          e.preventDefault();

          if (!termsCheckbox.checked) {
            alert("이용약관 및 개인정보처리방침에 동의해주세요.");
            return;
          }

          // Simulate signup process
          submitButton.textContent = "가입 중...";
          submitButton.disabled = true;

          setTimeout(() => {
            alert("회원가입이 완료되었습니다!");
            submitButton.textContent = "회원가입";
            submitButton.disabled = false;
          }, 2000);
        });
      }
    </script>
  </body>
</html>
